name: Godbin Bot

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

concurrency:
  group: godbin-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python run_once.py

      - name: Save state
        run: |
          git config user.name "godbin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add trades.json
          git diff --staged --quiet || git commit -m "state: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
