name: Godbin Bot

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

concurrency:
  group: godbin-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run scan
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python run_once.py

      - name: Save state
        shell: powershell
        run: |
          git config user.name "godbin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add trades.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm") + " UTC"
            git commit -m "state: $ts"
          }
          git push